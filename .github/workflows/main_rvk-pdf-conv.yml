name: Build and deploy Java project to Azure Function App - rvk-pdf-conv

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: rvk-pdf-conv
  POM_XML_DIRECTORY: apachefop-serverless-az-func
  JAVA_VERSION: '21'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Azure Functions Core Tools v4
        run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Build with Maven
        working-directory: ${{ env.POM_XML_DIRECTORY }}
        run: mvn -B -ntp clean package

      - name: List build output
        working-directory: ${{ env.POM_XML_DIRECTORY }}
        run: |
          ls -la
          ls -la target || true
          ls -la target/azure-functions || true

      - name: Capture package path
        id: pkg
        working-directory: ${{ env.POM_XML_DIRECTORY }}
        run: echo "PKG=$(ls -d target/azure-functions/* | head -n 1)" >> $GITHUB_OUTPUT

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A637D8580C664FAEB7036055046C58E9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1461CCEF2FBE4FF9AC1CC75C7F78EB02 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3D8017816E5048BFADD146FC24C10948 }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ steps.pkg.outputs.PKG }}
