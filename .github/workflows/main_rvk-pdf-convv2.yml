name: Build and deploy Java project to Azure Function App - rvk-pdf-convv2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: rvk-pdf-convv2
  POM_XML_DIRECTORY: apachefop-serverless-az-func
  POM_FUNCTION_APP_NAME: rvk-pdf-convv2
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Azure Functions Core Tools v4
        run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Build with Maven
        working-directory: ${{ env.POM_XML_DIRECTORY }}
        run: mvn -B -ntp clean package

      - name: List build output
        working-directory: ${{ env.POM_XML_DIRECTORY }}
        run: |
          echo "=== Build directory ==="
          ls -la target/azure-functions || true
          echo "=== Package contents ==="
          ls -la target/azure-functions/${{ env.POM_FUNCTION_APP_NAME }} || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app-package
          path: ${{ env.POM_XML_DIRECTORY }}/target/azure-functions/${{ env.POM_FUNCTION_APP_NAME }}/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app-package
          path: function-app-package

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: function-app-package
